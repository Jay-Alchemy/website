      category: 'pain',
      teaser: 'You don\'t repeat patterns because you\'re weak. You repeat them because they still solve something faster than you can consciously intervene. That\'s the part no one explains.',
      url: '#',           // ← Paste your PDF link here
      readTime: '8 min',
      featured: true,
      date: '2025-04'
    },

    {
      title: 'Why You Don\'t Feel Like Yourself',
      category: 'identity',
      teaser: 'You\'re not lost. You\'re switching between versions of yourself that were each built for different environments. The confusion is the output of a working system.',
      url: '#',           // ← Paste your PDF link here
      readTime: '6 min',
      featured: false,
      date: '2025-03'
    },

    {
      title: 'Why Your Brain Won\'t Let Go',
      category: 'trauma',
      teaser: 'Unresolved loops aren\'t emotional memories. They\'re neurological systems still waiting for a signal that the threat has passed. Understanding the mechanism changes what becomes possible.',
      url: '#',           // ← Paste your PDF link here
      readTime: '10 min',
      featured: false,
      date: '2025-02'
    }

    /* ── PASTE NEW POSTS ABOVE THIS LINE ──────────────────
    ,
    {
      title: 'Your Post Title Here',
      category: 'pain',     // 'pain' | 'identity' | 'trauma' | 'systems'
      teaser: 'One or two sentences. What will the reader understand after reading this?',
      url: 'https://drive.google.com/file/d/YOUR_FILE_ID/view',
      readTime: '7 min',    // optional — remove the line if unknown
      featured: false,
      date: '2025-05'       // YYYY-MM — newer = sorts higher
    }
    ─────────────────────────────────────────────────────── */
  ];

  /* ─── Category metadata ─── */
  var CAT = {
    pain:     { label: 'PAIN',     color: 'rgba(200,120,55,0.85)'  },
    identity: { label: 'IDENTITY', color: 'rgba(100,135,215,0.85)' },
    trauma:   { label: 'TRAUMA',   color: 'rgba(175,80,85,0.85)'   },
    systems:  { label: 'SYSTEMS',  color: 'rgba(90,160,120,0.85)'  }
  };

  /* ─── State ─── */
  var activeFilter = 'all';
  var grid    = document.getElementById('tbaGrid');
  var empty   = document.getElementById('tbaEmpty');
  var countEl = document.getElementById('tbaCount');
  var searchEl = document.getElementById('tbaSearch');

  /* ─── Reading progress bar ─── */
  var bar  = document.getElementById('tbaReadBar');
  var root = document.getElementById('tba-root');
  if (bar && root) {
    root.addEventListener('scroll', function() {
      var total = root.scrollHeight - root.clientHeight;
      bar.style.width = (total > 0 ? Math.min(100, Math.round((root.scrollTop / total) * 100)) : 0) + '%';
    }, { passive: true });
  }

  /* ─── Helpers ─── */
  function escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ─── Card builders ─── */
  function buildCard(post, isFeatured) {
    var meta = CAT[post.category] || CAT.pain;
    var el = document.createElement('article');
    el.className = 'tba-card tba-reveal' + (isFeatured ? ' tba-card--featured' : '');
    el.dataset.category = post.category;

    var timeHtml = post.readTime
      ? '<span class="tba-card-time">' + escHtml(post.readTime) + '</span>'
      : '';

    var linkText = isFeatured ? 'Read the full piece \u2192' : 'Read \u2192';

    el.innerHTML =
      '<div class="tba-card-top">' +
        '<div class="tba-card-top-left">' +
          '<span class="tba-card-dot" style="background:' + meta.color + '"></span>' +
          '<span class="tba-card-category">' +
            (isFeatured ? 'FEATURED &middot; ' : '') + meta.label +
          '</span>' +
        '</div>' +
        timeHtml +
      '</div>' +
      '<h3 class="tba-card-title">' + escHtml(post.title) + '</h3>' +
      '<p class="tba-card-teaser">' + escHtml(post.teaser) + '</p>' +
      '<a href="' + escHtml(post.url) + '" class="tba-card-link" target="_blank" rel="noopener noreferrer">' +
        linkText +
      '</a>';

    return el;
  }

  /* ─── Scroll reveal (re-applied after each render) ─── */
  function attachReveal() {
    var cards = grid.querySelectorAll('.tba-reveal');
    if (!window.IntersectionObserver) {
      for (var j = 0; j < cards.length; j++) {
        cards[j].style.opacity = '1';
        cards[j].style.transform = 'none';
      }
      return;
    }
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          io.unobserve(e.target);
        }
      });
    }, {
      root: root,
      threshold: 0.06,
      rootMargin: '0px 0px -20px 0px'
    });
    for (var i = 0; i < cards.length; i++) {
      cards[i].style.transitionDelay = Math.min(i, 5) * 60 + 'ms';
      io.observe(cards[i]);
    }
  }

  /* ─── Main render ─── */
  function render() {
    var query = searchEl ? searchEl.value.trim().toLowerCase() : '';

    var filtered = POSTS.filter(function(p) {
      var catOk = activeFilter === 'all' || p.category === activeFilter;
      var qOk = !query ||
        p.title.toLowerCase().indexOf(query) !== -1 ||
        p.teaser.toLowerCase().indexOf(query) !== -1;
      return catOk && qOk;
    });

    /* Sort: featured first, then newest */
    filtered.sort(function(a, b) {
      if (a.featured && !b.featured) return -1;
      if (!a.featured && b.featured) return 1;
      var da = a.date || '';
      var db = b.date || '';
      return db.localeCompare(da);
    });

    /* Update count */
    if (countEl) {
      countEl.textContent = filtered.length
        ? filtered.length + (filtered.length === 1 ? ' PIECE' : ' PIECES')
        : '';
    }

    /* Clear grid */
    grid.innerHTML = '';

    if (filtered.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    /* Render featured (first post with featured:true, if any) */
    var featuredIdx = -1;
    for (var f = 0; f < filtered.length; f++) {
      if (filtered[f].featured) { featuredIdx = f; break; }
    }

    if (featuredIdx !== -1) {
      grid.appendChild(buildCard(filtered[featuredIdx], true));
    }

    for (var i = 0; i < filtered.length; i++) {
      if (i !== featuredIdx) {
        grid.appendChild(buildCard(filtered[i], false));
      }
    }

    attachReveal();
  }

  /* ─── Filter buttons ─── */
  var filterBtns = document.querySelectorAll('#tbaFilters .tba-lib-filter');
  for (var b = 0; b < filterBtns.length; b++) {
    filterBtns[b].addEventListener('click', function() {
      for (var k = 0; k < filterBtns.length; k++) {
        filterBtns[k].classList.remove('active');
      }
      this.classList.add('active');
      activeFilter = this.dataset.filter;
      render();
      if (root) root.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  /* ─── Search ─── */
  if (searchEl) {
    searchEl.addEventListener('input', function() { render(); });
    searchEl.addEventListener('search', function() { render(); }); // clear button on mobile
  }

  /* ─── URL parameter pre-filter (?category=pain etc.) ─── */
  (function() {
    try {
      var params = new URLSearchParams(window.location.search);
      var cat = params.get('category') || params.get('filter');
      if (cat) {
        var match = null;
        for (var i = 0; i < filterBtns.length; i++) {
          if (filterBtns[i].dataset.filter === cat.toLowerCase()) {
            match = filterBtns[i];
            break;
          }
        }
        if (match) {
          for (var j = 0; j < filterBtns.length; j++) filterBtns[j].classList.remove('active');
          match.classList.add('active');
          activeFilter = cat.toLowerCase();
        }
      }
    } catch(e) { /* URLSearchParams not supported — use default */ }
  })();

  /* ─── Initial render ─── */
  render();

})();
</script>
</div>
